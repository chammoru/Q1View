<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Q1View Comparator icon (vector master). Same rounded-square family as the
       Viewer (Q1View.svg) in a teal tint, with a compare glyph: a centre divider
       bar between two offset side ticks. Render this to Comparator/res/Comparator.ico
       at each size (16/24/32/48/64/128/256); it is the app/taskbar icon and is not
       part of the MSIX payload (the package ships Viewer only). -->
  <!-- Teal rounded-square background -->
  <rect x="12" y="12" width="232" height="232" rx="58" fill="#14846B"/>
  <!-- White compare glyph: centre divider + upper-left / lower-right ticks -->
  <rect x="116.19" y="56.04" width="23.63" height="143.93" rx="11.81" fill="#F6F9FE"/>
  <rect x="60.33" y="97.93" width="47.26" height="16.11" rx="8.06" fill="#F6F9FE"/>
  <rect x="148.41" y="141.96" width="47.26" height="16.11" rx="8.06" fill="#F6F9FE"/>
</svg>
