name: Viewer Qt

on:
  push:
    branches:
      - cross-platform-core
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          cache: true

      - name: Configure
        run: cmake -S . -B build -DQ1VIEW_BUILD_SMOKE_TEST=OFF -DQ1VIEW_BUILD_QT_VIEWER=ON

      - name: Build
        run: cmake --build build --config Release --target q1view_viewer_qt --parallel

      - name: Package viewer
        shell: pwsh
        run: |
          $package = "package/q1view-viewer-qt-${{ runner.os }}"
          New-Item -ItemType Directory -Force $package | Out-Null

          if ($env:RUNNER_OS -eq "Windows") {
            $exe = Get-ChildItem build -Recurse -Filter q1view_viewer_qt.exe | Select-Object -First 1
            if (-not $exe) {
              throw "q1view_viewer_qt.exe was not found"
            }

            Copy-Item $exe.FullName $package
            windeployqt --release --no-translations "$package/q1view_viewer_qt.exe"
          } elseif ($env:RUNNER_OS -eq "macOS") {
            $app = Get-ChildItem build -Recurse -Directory -Filter q1view_viewer_qt.app | Select-Object -First 1
            if (-not $app) {
              throw "q1view_viewer_qt.app was not found"
            }

            macdeployqt $app.FullName -verbose=1
            Copy-Item $app.FullName $package -Recurse
          } else {
            $exe = Get-ChildItem build -Recurse -File -Filter q1view_viewer_qt | Select-Object -First 1
            if (-not $exe) {
              throw "q1view_viewer_qt was not found"
            }

            Copy-Item $exe.FullName $package
            New-Item -ItemType Directory -Force "$package/lib" | Out-Null
            New-Item -ItemType Directory -Force "$package/plugins/platforms" | Out-Null

            $qtLibDir = qmake -query QT_INSTALL_LIBS
            $qtPluginDir = qmake -query QT_INSTALL_PLUGINS

            if (-not (Test-Path $qtLibDir) -or -not (Test-Path $qtPluginDir)) {
              throw "Could not resolve Qt runtime paths. lib='$qtLibDir' plugins='$qtPluginDir'"
            }

            Get-ChildItem $qtLibDir -Filter "libQt6Core.so*" | Copy-Item -Destination "$package/lib"
            Get-ChildItem $qtLibDir -Filter "libQt6Gui.so*" | Copy-Item -Destination "$package/lib"
            Get-ChildItem $qtLibDir -Filter "libQt6Widgets.so*" | Copy-Item -Destination "$package/lib"
            Copy-Item (Join-Path $qtPluginDir "platforms/libqxcb.so") "$package/plugins/platforms"

            @"
          #!/usr/bin/env bash
          set -e
          APP_DIR="\$(cd "\$(dirname "\${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="\$APP_DIR/lib:\${LD_LIBRARY_PATH:-}"
          export QT_PLUGIN_PATH="\$APP_DIR/plugins"
          exec "\$APP_DIR/q1view_viewer_qt" "\$@"
          "@ | Out-File "$package/q1view-viewer-qt.sh" -Encoding utf8
            chmod +x "$package/q1view-viewer-qt.sh"
            chmod +x "$package/q1view_viewer_qt"

            @"
          q1view_viewer_qt Linux artifact

          Run ./q1view-viewer-qt.sh to start the experimental Qt viewer.

          This package includes the primary Qt 6 runtime libraries and the xcb platform plugin copied from the CI Qt installation.
          Some Linux distributions may still require system xcb/OpenGL libraries to be installed.

          Next packaging step: replace this with an AppImage/AppDir bundle.
          "@ | Out-File "$package/README-linux-runtime.txt" -Encoding utf8
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: q1view-viewer-qt-${{ matrix.os }}
          path: package/**
