name: Viewer Qt

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          # qtmultimedia adds Qt6::Multimedia / MultimediaWidgets so the viewer
          # builds its video-playback page; windeployqt / linuxdeploy bundle the
          # multimedia plugins from it.
          modules: qtmultimedia
          cache: true

      # HEIF/HEIC/AVIF decode needs libheif. install-qt-action does not ship it,
      # so each runner provides it: apt/brew on Unix, and the prebuilt
      # "decode-av1" root the Windows product already publishes (see
      # Q1ViewHeif.props / heif-dependency.yml).
      - name: Install libheif (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libheif-dev

      - name: Install libheif (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libheif
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Restore libheif (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build/Ensure-HeifDependency.ps1 `
            -InstallRoot ".deps/libheif-decode-av1-x64-windows" `
            -ArchiveUrl "https://github.com/chammoru/Q1View/releases/download/deps-libheif-decode-av1-x64-windows/Q1View-libheif-decode-av1-x64-windows.zip" `
            -Triplet "x64-windows"

      - name: Configure
        run: cmake -S . -B build -DQ1VIEW_BUILD_SMOKE_TEST=OFF -DQ1VIEW_BUILD_QT_VIEWER=ON

      - name: Build
        run: cmake --build build --config Release --target q1view_viewer_qt --parallel

      # Headless smoke check: --selftest opens each committed raw-format fixture
      # under the offscreen QPA platform and exits 0/1, exercising the shared-core
      # decode paths through the Qt front-end. Registered as ctest cases in the
      # Q1VIEW_BUILD_QT_VIEWER block (see CMakeLists.txt).
      - name: Smoke test (offscreen)
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package viewer (Windows/macOS)
        if: runner.os != 'Linux'
        shell: pwsh
        run: |
          $package = "package/q1view-viewer-qt-${{ runner.os }}"
          New-Item -ItemType Directory -Force $package | Out-Null

          if ($env:RUNNER_OS -eq "Windows") {
            $exe = Get-ChildItem build -Recurse -Filter q1view_viewer_qt.exe | Select-Object -First 1
            if (-not $exe) {
              throw "q1view_viewer_qt.exe was not found"
            }

            Copy-Item $exe.FullName $package

            # Ship the libheif runtime (heif.dll + its codec DLLs) alongside the
            # exe. windeployqt only handles Qt's own libraries.
            $heifBin = ".deps/libheif-decode-av1-x64-windows/bin"
            if (Test-Path $heifBin) {
              Copy-Item "$heifBin/*.dll" $package
            }

            windeployqt --release --no-translations "$package/q1view_viewer_qt.exe"
          } elseif ($env:RUNNER_OS -eq "macOS") {
            $app = Get-ChildItem build -Recurse -Directory -Filter q1view_viewer_qt.app | Select-Object -First 1
            if (-not $app) {
              throw "q1view_viewer_qt.app was not found"
            }

            macdeployqt $app.FullName -verbose=1
            Copy-Item $app.FullName $package -Recurse
          }

      - name: Package viewer (Linux AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail

          package="package/q1view-viewer-qt-${RUNNER_OS}"
          appdir="${package}/AppDir"
          mkdir -p "${appdir}/usr/bin"
          mkdir -p "${appdir}/usr/share/applications"
          mkdir -p "${appdir}/usr/share/icons/hicolor/scalable/apps"

          exe_path="$(find build -type f -name q1view_viewer_qt -perm -111 | head -n 1)"
          if [[ -z "${exe_path}" ]]; then
            echo "Files under build:"
            find build -maxdepth 5 -type f -print
            exit 1
          fi

          cp "${exe_path}" "${appdir}/usr/bin/q1view_viewer_qt"
          cp packaging/linux/q1view-viewer-qt.desktop "${appdir}/usr/share/applications/"
          cp packaging/linux/q1view-viewer-qt.svg "${appdir}/usr/share/icons/hicolor/scalable/apps/"

          qmake_path="$(command -v qmake6 || command -v qmake || true)"
          if [[ -z "${qmake_path}" ]]; then
            echo "qmake was not found in PATH"
            exit 1
          fi

          curl --fail --location --retry 3 --output linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl --fail --location --retry 3 --output linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export QMAKE="${qmake_path}"
          export OUTPUT="${PWD}/${package}/q1view-viewer-qt-linux-x86_64.AppImage"
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir "${appdir}" \
            --plugin qt \
            --output appimage

          chmod +x "${package}/q1view-viewer-qt-linux-x86_64.AppImage"

      # Verify the *packaged* artifact (its own bundled Qt libs/plugins and the
      # libheif runtime), not the build-tree binary the smoke test above used.
      # This is the automated stand-in for the manual clean-desktop check (#63):
      # the deployed bundle must open a common image and a raw frame and exit 0.
      - name: Verify packaged AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get install -y xvfb
          appimage="package/q1view-viewer-qt-${RUNNER_OS}/q1view-viewer-qt-linux-x86_64.AppImage"
          # xvfb gives the bundled xcb plugin a display; extract-and-run avoids
          # needing FUSE on the runner.
          export APPIMAGE_EXTRACT_AND_RUN=1
          xvfb-run -a "${appimage}" --selftest Tests/fixtures/sample_16x16.png
          xvfb-run -a "${appimage}" --selftest --raw --width 16 --height 16 \
            --format yuv420 Tests/fixtures/raw/gradient_16x16.yuv420

      - name: Verify packaged app (Windows/macOS)
        if: runner.os != 'Linux'
        shell: pwsh
        run: |
          $pkg = "package/q1view-viewer-qt-${{ runner.os }}"
          if ($env:RUNNER_OS -eq "Windows") {
            $bin = Join-Path $pkg "q1view_viewer_qt.exe"
          } else {
            $bin = Join-Path $pkg "q1view_viewer_qt.app/Contents/MacOS/q1view_viewer_qt"
          }
          if (-not (Test-Path $bin)) { throw "packaged binary not found: $bin" }
          function Invoke-SelfTest($AppArgs) {
            $p = Start-Process -FilePath $bin -ArgumentList $AppArgs -PassThru -NoNewWindow
            $null = $p.Handle   # cache handle so ExitCode is readable after exit
            if (-not $p.WaitForExit(60000)) {
              $p.Kill(); throw "packaged --selftest timed out: $($AppArgs -join ' ')"
            }
            if ($p.ExitCode -ne 0) {
              throw "packaged --selftest failed ($($p.ExitCode)): $($AppArgs -join ' ')"
            }
          }
          Invoke-SelfTest @("--selftest", "Tests/fixtures/sample_16x16.png")
          Invoke-SelfTest @("--selftest", "--raw", "--width", "16", "--height", "16", "--format", "yuv420", "Tests/fixtures/raw/gradient_16x16.yuv420")

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: q1view-viewer-qt-${{ matrix.os }}
          path: package/**
