name: Viewer Qt

on:
  push:
    branches:
      - cross-platform-core
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          cache: true

      - name: Configure
        run: cmake -S . -B build -DQ1VIEW_BUILD_SMOKE_TEST=OFF -DQ1VIEW_BUILD_QT_VIEWER=ON

      - name: Build
        run: cmake --build build --config Release --target q1view_viewer_qt --parallel

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: q1view-viewer-qt-${{ matrix.os }}
          path: |
            build/**/q1view_viewer_qt*
            build/**/q1view_viewer_qt.exe
