name: CMake Core

on:
  push:
    branches:
      - master
      - cross-platform-core
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DQ1VIEW_BUILD_SMOKE_TEST=ON

      - name: Build
        id: build
        shell: pwsh
        continue-on-error: true
        run: |
          cmake --build build --config Release --parallel *> build.log
          $exitCode = $LASTEXITCODE
          Get-Content build.log
          exit $exitCode

      - name: Annotate build failure
        if: steps.build.outcome == 'failure'
        shell: pwsh
        run: |
          $lines = Get-Content build.log | Select-Object -Last 80
          $message = ($lines -join "%0A").Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
          Write-Output "::error title=cmake build failed::$message"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: build.log

      - name: Stop after build failure
        if: steps.build.outcome == 'failure'
        shell: pwsh
        run: exit 1

      - name: Test
        id: test
        shell: pwsh
        continue-on-error: true
        run: |
          ctest --test-dir build --build-config Release --output-on-failure *> test.log
          $exitCode = $LASTEXITCODE
          Get-Content test.log
          exit $exitCode

      - name: Annotate test failure
        if: steps.test.outcome == 'failure'
        shell: pwsh
        run: |
          $lines = Get-Content test.log | Select-Object -Last 80
          $message = ($lines -join "%0A").Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
          Write-Output "::error title=ctest failed::$message"

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log-${{ matrix.os }}
          path: test.log

      - name: Stop after test failure
        if: steps.test.outcome == 'failure'
        shell: pwsh
        run: exit 1
