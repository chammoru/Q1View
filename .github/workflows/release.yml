name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release from this run"
        required: true
        default: false
        type: boolean
      tag_name:
        description: "Release tag name for manual releases, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  DIST_DIR: dist/Q1View-windows-x64

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Viewer
        run: msbuild Viewer\Viewer.sln /m /restore /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM /p:PlatformToolset=v143

      - name: Build Comparer
        run: msbuild Comparer\Comparer.sln /m /restore /p:Configuration=$env:BUILD_CONFIGURATION /p:Platform=$env:BUILD_PLATFORM /p:PlatformToolset=v143

      - name: Stage release files
        shell: pwsh
        run: |
          $viewer = "Viewer\$env:BUILD_PLATFORM\$env:BUILD_CONFIGURATION\Viewer.exe"
          $comparer = "Comparer\$env:BUILD_PLATFORM\$env:BUILD_CONFIGURATION\Comparer.exe"
          $requiredFiles = @($viewer, $comparer)

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Missing build output: $file"
            }
          }

          New-Item -ItemType Directory -Force $env:DIST_DIR | Out-Null
          Copy-Item $viewer $env:DIST_DIR
          Copy-Item $comparer $env:DIST_DIR

          Copy-Item "Viewer\$env:BUILD_PLATFORM\$env:BUILD_CONFIGURATION\*.dll" $env:DIST_DIR -Force
          Copy-Item "Comparer\$env:BUILD_PLATFORM\$env:BUILD_CONFIGURATION\*.dll" $env:DIST_DIR -Force

      - name: Resolve release metadata
        id: release_info
        shell: pwsh
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $releaseTag = "${{ github.ref_name }}"
          } elseif ("${{ inputs.tag_name }}" -ne "") {
            $releaseTag = "${{ inputs.tag_name }}"
          } else {
            $releaseTag = "manual-${{ github.run_number }}"
          }

          "release_tag=$releaseTag" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate git history
        shell: pwsh
        run: |
          $head = git rev-parse --short HEAD
          $tag = "${{ steps.release_info.outputs.release_tag }}"

          $previousTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          $range = if ($previousTag) { "$previousTag..HEAD" } else { "HEAD" }

          "# Q1View $tag" | Out-File CHANGELOG.md -Encoding utf8
          "" | Out-File CHANGELOG.md -Encoding utf8 -Append
          "- Commit: $head" | Out-File CHANGELOG.md -Encoding utf8 -Append
          if ($previousTag) {
            "- Changes since: $previousTag" | Out-File CHANGELOG.md -Encoding utf8 -Append
          }
          "" | Out-File CHANGELOG.md -Encoding utf8 -Append
          "## Git history" | Out-File CHANGELOG.md -Encoding utf8 -Append
          "" | Out-File CHANGELOG.md -Encoding utf8 -Append
          git log --pretty=format:"- %h %s (%an, %ad)" --date=short $range | Out-File CHANGELOG.md -Encoding utf8 -Append

          Copy-Item CHANGELOG.md $env:DIST_DIR

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:DIST_DIR/*" -DestinationPath Q1View-windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Q1View-windows-x64
          path: |
            Q1View-windows-x64.zip
            ${{ env.DIST_DIR }}/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Q1View ${{ steps.release_info.outputs.release_tag }}
          body_path: CHANGELOG.md
          files: |
            Q1View-windows-x64.zip
            ${{ env.DIST_DIR }}/Viewer.exe
            ${{ env.DIST_DIR }}/Comparer.exe
            ${{ env.DIST_DIR }}/*.dll
